apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-news
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-news
  template:
    metadata:
      labels:
        app: kube-news
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -p 5432 -U kubedevnews; do echo "aguardando postgres..."; sleep 2; done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: kube-news
          image: 030100501/kube-news:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: db-database
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: db-password
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: db-port
            - name: DB_SSL_REQUIRE
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: db-ssl-require
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
